components:
  schemas:
    DataFormActionResponse:
      title: DataForm Action Response
      required:
        - Action
        - Success
      type: object
      properties:
        Action:
          title: Action
          type: string
          description: Requested Action
        Ids:
          title: Object Ids
          type: array
          items:
            type: string
            format: uuid
          description: Object Ids affected by action
        Message:
          title: Message
          type: string
          description: Result summary or error message
        NextUrl:
          title: NextUrl
          type: string
          description: Suggested Next Url
        RunId:
          title: Run Id
          type: string
        Success:
          title: 'Operation successful '
          type: boolean
          description: 'Whether the operation successful '
      description: DataForm Action Response
    Entity:
      title: Entity
      required:
        - AccountId
        - name
        - description
      type: object
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        _id:
          title: Id
          type: string
          format: uuid
        _t:
          title: Type
          enum:
            - Account
            - Organization
            - User
          type: string
          x-enum-varnames:
            - ACCOUNT
            - ORGANIZATION
            - USER
          x-enum-descriptions:
            - Account
            - Organization
            - User
        email:
          title: Email
          type: string
          format: email
        phone:
          title: Phone
          type: string
          format: phone
        timeZone:
          title: Time Zone
          type: string
        organizationId:
          title: Organization
          type: string
        organizationId|Name:
          title: OrganizationId|Name
          type: string
        isActive:
          title: Active
          type: boolean
        FlowId:
          title: FlowId
          type: string
        FlowId|Name:
          title: FlowId|Name
          type: string
        ObjectStatusId:
          title: Status
          type: string
        ObjectStatusId|Name:
          title: ObjectStatusId|Name
          type: string
        CreatedOn:
          title: Created
          type: string
          format: date-time
        LastModifiedOn:
          title: Last Modified
          type: string
          format: date-time
        Identities:
          title: Identities
          type: array
          items:
            $ref: '#/components/schemas/EntityIdentity'
      description: Entity
      discriminator:
        propertyName: _t
        mapping:
          Organization: '#/components/schemas/Organization'
          User: '#/components/schemas/User'
          Account: '#/components/schemas/Account'
    Entity-indexed-fields:
      title: 'Entity: Filterable Fields'
      enum:
        - _id
        - _t
        - '#text'
        - AccountId
        - CreatedOn
        - FlowId
        - Identities_ExternalId
        - Identities_IdentityProviderId
        - isActive
        - LastModifiedOn
        - name
        - ObjectStatusId
        - organizationId
      type: string
      description: Filterable fields for Entity
    Entity-fields:
      title: 'Entity: Fields'
      enum:
        - _id
        - _t
        - AccountId
        - CreatedOn
        - description
        - email
        - FlowId
        - Identities
        - Identities__id
        - Identities_ExternalId
        - Identities_IdentityProviderId
        - Identities_Name
        - isActive
        - LastActor
        - LastModifiedOn
        - name
        - ObjectStatusId
        - organizationId
        - phone
        - timeZone
      type: string
      description: Fields for Entity
    Entity-condition:
      title: 'Entity: Filter Condition'
      type: object
      properties:
        fieldName:
          $ref: '#/components/schemas/Entity-indexed-fields'
        operator:
          $ref: '#/components/schemas/api-pi-condition-operator'
        value:
          title: Value
          description: Value to be used in the filter operation
      description: Field Condition for Entity
    filter--Entity--request:
      title: 'Entity: Filter Body'
      type: object
      properties:
        top:
          title: Top
          minimum: 0
          type: integer
          description: Max Number of objects to return
        skip:
          title: Skip
          minimum: 0
          type: integer
          description: Number of objects to skip
        orderBy:
          $ref: '#/components/schemas/Entity-indexed-fields'
        reverseOrder:
          title: Reverse Order
          type: boolean
          description: Order By in Reverse Order (Descending)
        view:
          title: View
          type: string
          description: Pre-defined view
        fields:
          title: Fields to return
          type: array
          items:
            $ref: '#/components/schemas/Entity-fields'
          description: List of fields to return
        criteria:
          title: Filter Criteria
          type: array
          items:
            $ref: '#/components/schemas/Entity-condition'
          description: Conditions to be used to filter objects
      description: Request Body to filter Entity
    filter--Entity--response:
      title: 'Entity: Filter Response'
      type: array
      items:
        $ref: '#/components/schemas/Entity'
      description: Response Body to filter Entity
    User:
      title: User
      type: object
      allOf:
        - $ref: '#/components/schemas/Entity'
      properties:
        role:
          title: Role
          enum:
            - Admin
            - Manager
            - Profile
            - User
          type: string
          x-enum-varnames:
            - ADMIN
            - MANAGER
            - PROFILE
            - USER
          x-enum-descriptions:
            - Admin
            - Manager
            - Limited Profile
            - User
        Identities|Salesforce|Main:
          title: Salesforce User
        Identities|Salesforce|ServiceResource:
          title: Salesforce Service Resource
        AppProfiles|PI:
          title: PI Profile
          type: string
        AppProfiles|PI|Name:
          title: AppProfiles|PI|Name
          type: string
        AppProfiles|PLM:
          title: PLM Profile
          type: string
        AppProfiles|PLM|Name:
          title: AppProfiles|PLM|Name
          type: string
        AppProfiles|OTG:
          title: OTG Profile
          type: string
        AppProfiles|OTG|Name:
          title: AppProfiles|OTG|Name
          type: string
        AppProfiles:
          title: Profiles
          type: object
        Messages:
          title: Messages
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        organization:
          $ref: '#/components/schemas/Organization'
      description: User
      discriminator:
        propertyName: role
        mapping:
          Manager: '#/components/schemas/UserManager'
          Admin: '#/components/schemas/UserAdmin'
          User: '#/components/schemas/UserDesignAssociate'
    User-indexed-fields:
      title: 'User: Filterable Fields'
      enum:
        - _id
        - _t
        - '#text'
        - AccountId
        - CreatedOn
        - FlowId
        - Identities_ExternalId
        - Identities_IdentityProviderId
        - isActive
        - LastModifiedOn
        - name
        - ObjectStatusId
        - organizationId
        - role
      type: string
      description: Filterable fields for User
    User-fields:
      title: 'User: Fields'
      enum:
        - _id
        - _t
        - AccountId
        - AppProfiles|OTG
        - AppProfiles|PI
        - AppProfiles|PLM
        - CreatedOn
        - description
        - email
        - FlowId
        - Identities
        - Identities__id
        - Identities_ExternalId
        - Identities_IdentityProviderId
        - Identities_Name
        - Identities|Salesforce|Main
        - Identities|Salesforce|ServiceResource
        - isActive
        - LastActor
        - LastModifiedOn
        - name
        - ObjectStatusId
        - organization_Identities
        - organization_Identities__id
        - organization_Identities_ExternalId
        - organization_Identities_IdentityProviderId
        - organization_Identities_Name
        - organization_PPATargets
        - organization_PPATargets_Carpet
        - organization_PPATargets_CeramicTile
        - organization_PPATargets_Hardwood
        - organization_PPATargets_Laminate
        - organization_PPATargets_Message
        - organization_PPATargets_NaturalStone
        - organization_PPATargets_Vinyl
        - organization_Promos
        - organization_Promos_FallIntoFloorfest
        - organization_Promos_Message
        - organizationId
        - phone
        - role
        - timeZone
      type: string
      description: Fields for User
    User-condition:
      title: 'User: Filter Condition'
      type: object
      properties:
        fieldName:
          $ref: '#/components/schemas/User-indexed-fields'
        operator:
          $ref: '#/components/schemas/api-pi-condition-operator'
        value:
          title: Value
          description: Value to be used in the filter operation
      description: Field Condition for User
    filter--User--request:
      title: 'User: Filter Body'
      type: object
      properties:
        top:
          title: Top
          minimum: 0
          type: integer
          description: Max Number of objects to return
        skip:
          title: Skip
          minimum: 0
          type: integer
          description: Number of objects to skip
